<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos Médicos - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Sistema de Turnos Médicos</h1>
        <div class="tabs">
            <button class="tab-button active" onclick="showTab('login')">Iniciar Sesión</button>
            <button class="tab-button" onclick="showTab('register')">Registrarse</button>
        </div>

        <div id="login" class="tab-content active">
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Contraseña" required>
                <button type="submit">Iniciar Sesión</button>
            </form>
        </div>

        <div id="register" class="tab-content">
            <form id="registerForm">
                <input type="text" id="registerNombre" placeholder="Nombre" required>
                <input type="email" id="registerEmail" placeholder="Email" required>
                <input type="password" id="registerPassword" placeholder="Contraseña" required>
                <button type="submit">Registrarse</button>
            </form>
        </div>

        <div id="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
